server:
  addr: ":8080"
  admin_key: "change-me-admin-key"
  shutdown_timeout: 15s

auth:
  file: "./auth.json"
  upstream_base: "https://api.x.ai/v1"
  refresh_skew: 5m
  # issuer: "https://auth.x.ai"
  # client_id: ""
  # account: ""  # optional map key prefix filter

db:
  # Prefer postgres in production (no local PVC required).
  driver: "postgres" # sqlite | postgres
  dsn: "host=localhost user=proxy password=proxy dbname=proxy port=5432 sslmode=disable"
  # driver: "sqlite"
  # dsn: "./data/proxy.db"

rate_limit:
  rps: 10
  burst: 20

cors:
  allowed_origins:
    - "*"

log:
  level: "info"
  redact: true

# Proxied request/response bodies stored in DB (admin /admin/audit).
audit:
  enabled: true
  max_body_bytes: 65536

metrics:
  enabled: true
  path: "/metrics"
