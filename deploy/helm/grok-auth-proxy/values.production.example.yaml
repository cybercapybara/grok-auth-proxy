# Example production overrides (no PVC, external Postgres).
# Copy outside the repo:
#   cp values.production.example.yaml ~/secrets/grok-auth-proxy-values.yaml
#   helm upgrade --install grok-auth-proxy . -n <ns> \
#     -f ~/secrets/grok-auth-proxy-values.yaml
#
# Required Secrets (create separately):
#   kubectl create secret generic grok-auth-proxy-admin --from-literal=admin-key='…'
#   kubectl create secret generic grok-auth-proxy-auth --from-file=auth.json=./auth.json
#   kubectl create secret generic grok-auth-proxy-db \
#     --from-literal=dsn='host=… user=… password=… dbname=… port=5432 sslmode=require'

replicaCount: 1

strategy:
  type: RollingUpdate

image:
  repository: example.com/grok-auth-proxy
  tag: latest
  pullPolicy: Always

admin:
  existingSecret: grok-auth-proxy-admin
  secretKey: admin-key

auth:
  existingSecret: grok-auth-proxy-auth
  secretKey: auth.json
  # Mount Secret at config.authFile; do not use PVC.
  seedToDataVolume: false

database:
  existingSecret: grok-auth-proxy-db
  secretKey: dsn

config:
  serverAddr: ":8080"
  authFile: /config/auth.json
  upstreamBase: https://api.x.ai/v1
  refreshSkew: 5m
  dbDriver: postgres
  # Overridden by database.existingSecret when set.
  dbDsn: ""
  rateLimitRps: "20"
  rateLimitBurst: "40"
  logLevel: info
  logRedact: "true"
  metricsEnabled: "true"
  auditEnabled: "true"
  auditMaxBodyBytes: "65536"

persistence:
  enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
  hosts:
    - host: grok-proxy.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - grok-proxy.example.com
      secretName: grok-proxy-tls

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi
