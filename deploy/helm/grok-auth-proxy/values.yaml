# Single-replica is fine with external Postgres; no PVC required.
# Auth token refresh is persisted to the database (auth_states table).
#
# For real clusters, copy values.production.example.yaml to a private file outside
# the repo (or values-private.yaml, which is gitignored). Never commit real
# hostnames, public IPs, or cluster-specific names.
replicaCount: 1

strategy:
  type: RollingUpdate

image:
  repository: moveeeax/grok-auth-proxy
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: grok-proxy.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Non-secret configuration (rendered into ConfigMap / env)
config:
  serverAddr: ":8080"
  # When seedToDataVolume=false, mount auth secret here (read-only).
  authFile: /config/auth.json
  upstreamBase: https://api.x.ai/v1
  refreshSkew: 5m
  # Optional fallbacks if auth.json lacks oidc_client_id / oidc_issuer (Grok CLI fields).
  issuer: ""
  clientId: ""
  # Prefer external Postgres in production (no PVC).
  dbDriver: postgres
  # Used only if database.existingSecret is empty (dev). Prefer secret for real DSN.
  dbDsn: "host=postgres user=proxy password=proxy dbname=proxy port=5432 sslmode=disable"
  rateLimitRps: "10"
  rateLimitBurst: "20"
  logLevel: info
  logRedact: "true"
  metricsEnabled: "true"
  auditEnabled: "true"
  auditMaxBodyBytes: "65536"

# External Postgres DSN (recommended). Key should contain the full libpq/GORM DSN.
database:
  existingSecret: ""
  secretKey: dsn

# Admin key: create a Secret and reference it here.
admin:
  existingSecret: ""
  secretKey: admin-key
  # Only for local/dev — prefer existingSecret in production.
  value: ""

# Grok auth.json bootstrap Secret.
# seedToDataVolume=false: mount secret directly at config.authFile (no PVC).
# Token refresh is stored in Postgres (auth_states); file write may fail on RO mount (OK).
auth:
  existingSecret: ""
  secretKey: auth.json
  seedToDataVolume: false

# Disabled by default — use external Postgres instead of SQLite on a volume.
persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Extra env vars
extraEnv: []
