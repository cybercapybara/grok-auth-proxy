{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "grok-auth-proxy.fullname" . }}
  labels:
    {{- include "grok-auth-proxy.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: grok-auth-proxy
      rules:
        - alert: GrokAuthProxyDown
          expr: |
            up{job="{{ include "grok-auth-proxy.fullname" . }}", namespace="{{ .Release.Namespace }}"} == 0
            or
            absent(up{job="{{ include "grok-auth-proxy.fullname" . }}", namespace="{{ .Release.Namespace }}"})
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "grok-auth-proxy is down"
            description: "Prometheus cannot scrape grok-auth-proxy in namespace {{ .Release.Namespace }} for more than 2 minutes."

        - alert: GrokAuthProxyHighErrorRate
          expr: |
            (
              sum(rate(gap_http_requests_total{namespace="{{ .Release.Namespace }}", path=~"/v1/.*", status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(gap_http_requests_total{namespace="{{ .Release.Namespace }}", path=~"/v1/.*"}[5m])), 1e-9)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx rate on grok-auth-proxy /v1"
            description: "More than 5% of /v1 requests return 5xx over 5 minutes."

        - alert: GrokAuthProxyChatLatencyHigh
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(gap_http_request_duration_seconds_bucket{
                  namespace="{{ .Release.Namespace }}",
                  path="/v1/chat/completions"
                }[5m])
              )
            ) > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High p95 latency for chat completions"
            description: "p95 latency for /v1/chat/completions is above 30s for 10 minutes."
{{- end }}
